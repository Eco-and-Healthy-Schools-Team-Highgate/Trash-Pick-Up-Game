<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highgate Eco-Sorter</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background: #a2d2ff; cursor: crosshair; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.8);
            padding: 20px; border-radius: 15px; pointer-events: none; 
            display: none; border: 2px solid #ffeb3b;
        }
        #score { font-size: 32px; color: #a2ffaf; }
        #carrying-text { font-size: 18px; color: #ffeb3b; margin-top: 5px; }
        #warning-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.95); color: white; padding: 40px;
            border-radius: 20px; text-align: center; display: none; z-index: 100;
            border: 10px solid white; width: 80%; pointer-events: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        #warning-text { font-size: 60px; margin: 0; line-height: 1.1; }
        #start-screen {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 30;
        }
        button { 
            padding: 20px 60px; font-size: 28px; cursor: pointer; 
            background: #ffeb3b; border: none; border-radius: 50px; 
            font-weight: bold; color: #2e7d32; transition: 0.2s;
        }
        button:hover { transform: scale(1.1); background: white; }
        .credit { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-size: 60px; margin-bottom: 0;">ECO-SORTER</h1>
        <button id="start-btn">CLICK TO PLAY</button>
        <div class="credit">Made by a student at Highgate from the Eco and Healthy Schools Team</div>
    </div>

    <div id="warning-screen">
        <h2 id="warning-text">THIS GOES IN THE RECYCLE BIN!</h2>
    </div>

    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="carrying-text">Empty Handed</div>
        <div style="font-size: 12px; margin-top: 10px; color: #ccc;">WASD: Move | SPACE: Jump | ESC: Unlock/lock Mouse</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let gameActive = false, score = 0, heldItemData = null, heldItemMesh = null;
        let trashOnField = [], keys = { w: false, a: false, s: false, d: false, ' ': false };
        let velocityY = 0, isGrounded = true;
        const gravity = -0.012;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(20, 40, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- CHARACTER ---
        const noob = new THREE.Group();
        const matHead = new THREE.MeshStandardMaterial({ color: 0xffd500 });
        const matTorso = new THREE.MeshStandardMaterial({ color: 0x0059ff });
        const matLimb = new THREE.MeshStandardMaterial({ color: 0x00d000 });
        
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), matHead);
        head.position.y = 2.2;
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 0.6), matTorso);
        torso.position.y = 1.1;
        const armL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.4, 0.5), matHead);
        armL.position.set(-0.9, 1.1, 0);
        const armR = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.4, 0.5), matHead);
        armR.position.set(0.9, 1.1, 0);
        const legL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 0.5), matLimb);
        legL.position.set(-0.35, 0.2, 0);
        const legR = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 0.5), matLimb);
        legR.position.set(0.35, 0.2, 0);

        noob.add(head, torso, armL, armR, legL, legR);
        scene.add(noob);

        const cameraPivot = new THREE.Group();
        noob.add(cameraPivot);
        cameraPivot.add(camera);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 2, 0);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x7cfc00 }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        function createFence(x, z, rot, len) {
            const group = new THREE.Group();
            const fenceMat = new THREE.MeshStandardMaterial({color: 0x8B4513});
            for(let i=0; i<len; i+=4) {
                const post = new THREE.Mesh(new THREE.BoxGeometry(0.4, 2.5, 0.4), fenceMat);
                post.position.x = i - len/2;
                group.add(post);
                const rail = new THREE.Mesh(new THREE.BoxGeometry(4.2, 0.3, 0.15), fenceMat);
                rail.position.set(i - len/2 + 2, 0.8, 0);
                group.add(rail);
                const railTop = rail.clone(); railTop.position.y = 1.8;
                group.add(railTop);
            }
            group.position.set(x, 1.25, z);
            group.rotation.y = rot;
            scene.add(group);
        }
        createFence(0, -49, 0, 100); createFence(0, 49, 0, 100);
        createFence(-49, 0, Math.PI/2, 100); createFence(49, 0, Math.PI/2, 100);

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 2), new THREE.MeshStandardMaterial({color: 0x5D4037}));
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.8, 4, 8), new THREE.MeshStandardMaterial({color: 0x1B5E20}));
            leaves.position.y = 2.5;
            tree.add(trunk, leaves);
            tree.position.set(x, 1, z);
            scene.add(tree);
        }
        for(let i=0; i<15; i++) {
            createTree((Math.random()-0.5)*80, (Math.random()-0.5)*80);
        }

        function createBin(x, color, type) {
            const group = new THREE.Group();
            const bin = new THREE.Mesh(new THREE.BoxGeometry(3.5, 4.5, 2.5), new THREE.MeshStandardMaterial({ color: color }));
            group.add(bin);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 256;
            ctx.fillStyle = 'white'; ctx.fillRect(0,0,512,256);
            ctx.fillStyle = 'black'; ctx.font = 'Bold 90px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(type.toUpperCase(), 256, 128);
            const label = new THREE.Mesh(new THREE.PlaneGeometry(3, 1.5), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas) }));
            label.position.set(0, 0.8, 1.26);
            group.add(label);
            group.position.set(x, 2.25, -40);
            group.userData = { type: type };
            scene.add(group);
            return group;
        }
        const bins = [
            createBin(-30, 0x2196f3, 'Glass'),
            createBin(-15, 0x2196f3, 'recycle'),
            createBin(0, 0x4caf50, 'compost'), 
            createBin(15, 0x616161, 'garbage'),
            createBin(30, 0x0CB729, 'eWaste')
        ];

 const response = await fetch(
    'https://raw.githubusercontent.com/console12345craze/trash/main/trash.json'
);

const text = await response.text();

const trashTypes = eval(text);

console.log(trashTypes);
            

        function spawnWave() {
            for(let i=0; i<5; i++) {
                const data = trashTypes[Math.floor(Math.random() * trashTypes.length)];
                const item = new THREE.Mesh(new THREE.IcosahedronGeometry(0.6), new THREE.MeshStandardMaterial({ color: data.color }));
                item.position.set((Math.random()-0.5)*70, 0.6, (Math.random()*60 - 20));
                item.userData = data;
                scene.add(item);
                trashOnField.push(item);
            }
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            gameActive = true;
            spawnWave();
        });

        let pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                noob.rotation.y -= e.movementX * 0.003;
                pitch = Math.max(-0.6, Math.min(0.4, pitch - e.movementY * 0.003)); 
                cameraPivot.rotation.x = pitch;
            }
        });

        // --- KEYBOARD LISTENERS (Line 160ish) ---
        window.addEventListener('keydown', (e) => { 
            const k = e.key.toLowerCase();
            if(k in keys) keys[k] = true;
            if(e.key === ' ') keys[' '] = true;

            // THE ESC TOGGLE
            if (e.key === 'Escape') {
                if (document.pointerLockElement !== document.body) {
                    setTimeout(() => {
                        if (gameActive) document.body.requestPointerLock();
                    }, 100);
                }
            }
        });

        window.addEventListener('keyup', (e) => { 
            const k = e.key.toLowerCase();
            if(k in keys) keys[k] = false;
            if(e.key === ' ') keys[' '] = false;
        });

        function showScream(targetType) {
            const screen = document.getElementById('warning-screen');
            document.getElementById('warning-text').innerText = `THIS GOES IN THE ${targetType.toUpperCase()} BIN!`;
            screen.style.display = 'block';
            setTimeout(() => { screen.style.display = 'none'; }, 2500);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) return;

            velocityY += gravity;
            noob.position.y += velocityY;
            if (noob.position.y <= 0) { noob.position.y = 0; velocityY = 0; isGrounded = true; }
            if (keys[' '] && isGrounded) { velocityY = 0.28; isGrounded = false; }

            const moveSpeed = 0.68;
            const dir = new THREE.Vector3();
            if (keys.w) dir.z -= 1; if (keys.s) dir.z += 1;
            if (keys.a) dir.x -= 1; if (keys.d) dir.x += 1;
            dir.normalize().applyQuaternion(noob.quaternion).multiplyScalar(moveSpeed);
            noob.position.add(dir);

            noob.position.x = Math.max(-48, Math.min(48, noob.position.x));
            noob.position.z = Math.max(-48, Math.min(48, noob.position.z));

            if (!heldItemMesh) {
                trashOnField.forEach((item, i) => {
                    if (noob.position.distanceTo(item.position) < 2.2) {
                        heldItemData = item.userData;
                        heldItemMesh = item;
                        armR.add(heldItemMesh);
                        heldItemMesh.position.set(0, -0.8, 0);
                        trashOnField.splice(i, 1);
                        document.getElementById('carrying-text').innerText = `Holding: ${heldItemData.name}`;
                    }
                });
            }

            if (heldItemMesh) {
                bins.forEach(bin => {
                    if (noob.position.distanceTo(bin.position) < 4) {
                        if (bin.userData.type === heldItemData.target) {
                            score += 5;
                            document.getElementById('score').innerText = `Score: ${score}`;
                        } else {
                            showScream(heldItemData.target);
                        }
                        armR.remove(heldItemMesh);
                        heldItemMesh.geometry.dispose();
                        heldItemMesh.material.dispose();
                        heldItemMesh = null;
                        heldItemData = null;
                        document.getElementById('carrying-text').innerText = `Empty Handed`;
                        if (trashOnField.length === 0) spawnWave();
                    }
                });
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
